<!DOCTYPE html><html>
<head>
<title>Loading...</title><style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
}

#iframe{
border:none;
width:100%;
height:100%;
}
</style></head><body><iframe id="iframe"
allow="camera; microphone; fullscreen"
allowfullscreen>
</iframe><script>

fetch("link.json?t=" + Date.now())
.then(response => response.json())
.then(data => {

document.getElementById("iframe").src = data.url;

});

</script></body>
</html>
